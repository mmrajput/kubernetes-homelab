apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: databases-secrets
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: databases-secrets
    creationPolicy: Owner
  data:
    # Keycloak PostgreSQL user credentials (used by CNPG initdb)
    - secretKey: db-username
      remoteRef:
        key: secret/data/databases/keycloak
        property: username
    - secretKey: db-password
      remoteRef:
        key: secret/data/databases/keycloak
        property: password
    # MinIO credentials for CNPG WAL archiving and base backups
    - secretKey: access-key
      remoteRef:
        key: secret/data/minio/cnpg
        property: access-key
    - secretKey: secret-key
      remoteRef:
        key: secret/data/minio/cnpg
        property: secret-key