apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cnpg-instances
  namespace: databases
  labels:
    app.kubernetes.io/managed-by: cloudnative-pg
spec:
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: cloudnative-pg
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      scheme: http
