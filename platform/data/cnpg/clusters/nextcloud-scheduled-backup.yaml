apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nextcloud-db-backup
  namespace: databases
spec:
  # Run base backup daily at 3:00 AM
  # WAL archiving is continuous and independent of this schedule
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: nextcloud-db
  target: primary
  method: barmanObjectStore
