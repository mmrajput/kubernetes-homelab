apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: databases
  annotations:
    # Exclude PostgreSQL PVCs from Velero block-level snapshots.
    # CNPG handles database backup independently via Barman to MinIO:
    #   - Continuous WAL archiving for PITR
    #   - Periodic base backups via pg_basebackup
    # Velero covers Kubernetes objects and non-database PVCs.
    # Production pattern: always exclude CNPG PVCs from Velero to avoid
    # redundant snapshots and potential consistency issues with block-level
    # snapshots of live PostgreSQL data directories.
    backup.velero.io/backup-volumes-excludes: pgdata
spec:
  # instances: 2 — primary + 1 hot standby replica
  #
  # podAntiAffinityType: required ensures CNPG schedules primary and standby
  # on different nodes (k8s-worker-01 and k8s-worker-02).
  # If only one worker is available, the replica pod will stay Pending rather
  # than co-locate with the primary — correct behaviour for a HA cluster.
  #
  # Avoids the RWO Multi-Attach issue where a restarted single-instance pod
  # gets scheduled on a different node than its existing PVC attachment.
  instances: 2

  affinity:
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"

  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      secret:
        name: keycloak-initdb-secret

  storage:
    storageClass: longhorn
    size: 5Gi

  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/keycloak
      endpointURL: http://minio.minio.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: cnpg-minio-secret
          key: access-key
        secretAccessKey:
          name: cnpg-minio-secret
          key: secret-key
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: 7d

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
      