apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-onedrive-sync-cnpg
  namespace: velero
spec:
  # Run at 4:15 AM daily — staggered 15 minutes after velero sync
  schedule: "15 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rclone
              image: rclone/rclone:1.68
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== Syncing cnpg-backups bucket ==="
                  rclone sync \
                    --config=/config/rclone.conf \
                    --transfers=4 \
                    --log-level=INFO \
                    minio:cnpg-backups onedrive:homelab-backups/cnpg-backups
                  echo "=== Sync complete ==="
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: rclone-config
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: rclone-config
              secret:
                secretName: rclone-config
                items:
                  - key: rclone.conf
                    path: rclone.conf