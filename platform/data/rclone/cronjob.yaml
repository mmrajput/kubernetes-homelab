apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-onedrive-sync
  namespace: velero
spec:
  # Run at 4:00 AM daily — after Velero nightly-full (2 AM) and
  # CNPG base backup (3:30 AM) have both completed
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rclone
              image: rclone/rclone:1.68
              args:
                - sync
                - --config=/config/rclone.conf
                - --transfers=4
                - --checkers=8
                - --log-level=INFO
                - --stats=30s
                # Sync both backup buckets to OneDrive under homelab-backups/
                # Run as two sequential syncs in a single container via sh -c
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== Syncing velero bucket ==="
                  rclone sync \
                    --config=/config/rclone.conf \
                    --transfers=4 \
                    --log-level=INFO \
                    minio:velero onedrive:homelab-backups/velero

                  echo "=== Syncing cnpg-backups bucket ==="
                  rclone sync \
                    --config=/config/rclone.conf \
                    --transfers=4 \
                    --log-level=INFO \
                    minio:cnpg-backups onedrive:homelab-backups/cnpg-backups

                  echo "=== Sync complete ==="
              volumeMounts:
                - name: rclone-config
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: rclone-config
              secret:
                secretName: rclone-config
                items:
                  - key: rclone.conf
                    path: rclone.conf
