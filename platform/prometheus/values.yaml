# kube-prometheus-stack Helm Values for Homelab
# Chart: prometheus-community/kube-prometheus-stack

# Global settings
fullnameOverride: prometheus

# Disable bundled Grafana (deploying separately)
grafana:
  enabled: false

# Prometheus configuration
prometheus:
  # Ingress at SERVICE level (not prometheusSpec)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    hosts:
      - prometheus.mmrajputhomelab.org
    paths:
      - /
    pathType: Prefix
    tls:
      - hosts:
          - prometheus.mmrajputhomelab.org
        secretName: wildcard-homelab-tls

  prometheusSpec:
    # Resource limits for homelab
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi
    
    # Retention optimized for 500GB disk
    retention: 15d
    retentionSize: "45GB"
    
    # Storage with local-path
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    
    # Discover all ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# Alertmanager configuration
alertmanager:
  serviceAccount:
    create: true
    automountServiceAccountToken: false  # ServiceAccount level: default for any pod using this SA
  # Ingress at SERVICE level (not alertmanagerSpec)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    hosts:
      - alertmanager.mmrajputhomelab.org
    paths:
      - /
    pathType: Prefix
    tls:
      - hosts:
          - alertmanager.mmrajputhomelab.org
        secretName: wildcard-homelab-tls

  alertmanagerSpec:
    automountServiceAccountToken: false  # Pod spec level: explicit override, takes precedence over SA setting
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

# Node exporter - runs on every node
prometheus-node-exporter:
  serviceAccount:
    create: true
    automountServiceAccountToken: false  # ServiceAccount level: default for any pod using this SA
  automountServiceAccountToken: false  # Pod spec level: explicit override, takes precedence over SA setting
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 200Mi

# Kube-state-metrics (Collects cluster level metrics)
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      memory: 400Mi

# Operator itself
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
