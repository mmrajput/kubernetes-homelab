# kube-prometheus-stack Helm Values for Homelab
# Chart: prometheus-community/kube-prometheus-stack

# Global settings
fullnameOverride: prometheus

# Disable bundled Grafana (deploying separately)
# forceDeployDashboards: create dashboard ConfigMaps even with grafana.enabled: false
# so the standalone Grafana sidecar can import them (label: grafana_dashboard=1)
grafana:
  enabled: false
  forceDeployDashboards: true
  sidecar:
    dashboards:
      label: grafana_dashboard
      labelValue: "1"
      annotations:
        grafana_folder: Kubernetes

# Prometheus configuration
prometheus:
  # Ingress at SERVICE level (not prometheusSpec)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    hosts:
      - prometheus.mmrajputhomelab.org
    paths:
      - /
    pathType: Prefix

  prometheusSpec:
    # Resource limits for homelab
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi
    
    # Retention optimized for 500GB disk
    retention: 15d
    retentionSize: "45GB"
    
    # Storage with local-path
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    
    # Discover all ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# Alertmanager configuration
alertmanager:
  serviceAccount:
    create: true
    automountServiceAccountToken: false  # ServiceAccount level: default for any pod using this SA
  # Ingress at SERVICE level (not alertmanagerSpec)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    hosts:
      - alertmanager.mmrajputhomelab.org
    paths:
      - /
    pathType: Prefix

  alertmanagerSpec:
    automountServiceAccountToken: false  # Pod spec level: explicit override, takes precedence over SA setting
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

# Node exporter - runs on every node
prometheus-node-exporter:
  serviceAccount:
    create: true
    automountServiceAccountToken: false  # ServiceAccount level: default for any pod using this SA
  automountServiceAccountToken: false  # Pod spec level: explicit override, takes precedence over SA setting
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 200Mi

# Kube-state-metrics (Collects cluster level metrics)
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      memory: 400Mi

# Control plane component scraping
# kubeadm binds controller-manager, scheduler, and etcd to 127.0.0.1 by default.
# Static pod manifests on k8s-cp-01 must be patched to bind to 0.0.0.0 (see below).
kubeControllerManager:
  enabled: true
  endpoints:
    - 192.168.178.34
  service:
    enabled: true
    port: 10257
    targetPort: 10257
  serviceMonitor:
    https: true
    insecureSkipVerify: true

kubeScheduler:
  enabled: true
  endpoints:
    - 192.168.178.34
  service:
    enabled: true
    port: 10259
    targetPort: 10259
  serviceMonitor:
    https: true
    insecureSkipVerify: true

# kubeadm sets --listen-metrics-urls=http://127.0.0.1:2381 — patch etcd manifest to use 0.0.0.0.
kubeEtcd:
  enabled: true
  endpoints:
    - 192.168.178.34
  service:
    enabled: true
    port: 2381
    targetPort: 2381
  serviceMonitor:
    scheme: http
    insecureSkipVerify: false

# kube-proxy metricsBindAddress defaults to "" (127.0.0.1:10249) — patch ConfigMap to 0.0.0.0:10249.
kubeProxy:
  enabled: true
  endpoints:
    - 192.168.178.34
    - 192.168.178.35
    - 192.168.178.36

# Operator itself
prometheusOperator:
  # Admission webhook disabled - not required for homelab
  # In production this validates PrometheusRules before they are applied
  admissionWebhooks:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
