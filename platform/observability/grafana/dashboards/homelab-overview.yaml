        {
          "id": 53,
          "title": "GitOps Health",
          "description": "ArgoCD application sync and health status, and TLS certificate expiry countdown.",
          "type": "row",
          "gridPos": { "x": 0, "y": 53, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 54,
          "title": "ArgoCD applications",
          "description": "All ArgoCD-managed applications with current sync and health status.",
          "type": "table",
          "gridPos": { "x": 0, "y": 54, "w": 14, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "footer": { "show": false },
            "sortBy": [{ "displayName": "Application", "desc": false }]
          },
          "fieldConfig": {
            "defaults": {
              "custom": { "align": "left", "displayMode": "auto", "filterable": false }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sync" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-text" },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "Synced": { "color": "green", "index": 0 }, "OutOfSync": { "color": "red", "index": 1 } } }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Health" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-text" },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "Healthy": { "color": "green", "index": 0 }, "Degraded": { "color": "red", "index": 1 }, "Progressing": { "color": "yellow", "index": 2 }, "Suspended": { "color": "blue", "index": 3 }, "Missing": { "color": "orange", "index": 4 } } }
                    ]
                  }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "name": "Application",
                  "sync_status": "Sync",
                  "health_status": "Health",
                  "dest_namespace": "Namespace",
                  "project": "Project"
                },
                "indexByName": {
                  "Application": 0,
                  "Health": 1,
                  "Sync": 2,
                  "Namespace": 3,
                  "Project": 4
                },
                "excludeByName": {
                  "Time": true, "Value": true,
                  "app_namespace": true, "dest_server": true,
                  "namespace": true, "operation": true, "repo": true
                }
              }
            },
            {
              "id": "filterFieldsByName",
              "options": {
                "include": { "names": ["Application", "Health", "Sync", "Namespace", "Project"] }
              }
            }
          ],
          "targets": [
            {
              "expr": "argocd_app_info",
              "instant": true,
              "format": "table",
              "legendFormat": "__auto",
              "refId": "A"
            }
          ]
        },
        {
          "id": 55,
          "title": "TLS certificate expiry",
          "description": "Days remaining until each cert-manager certificate expires. Red < 7 days, yellow < 30 days. Note: public-facing TLS (*.mmrajputhomelab.org) is managed by Cloudflare at the edge — these entries are cluster-internal certificates issued by cert-manager for operator webhooks (CNPG, ESO, ARC) and any internal ingress routes.",
          "type": "bargauge",
          "gridPos": { "x": 14, "y": 54, "w": 10, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true,
            "minVizWidth": 8,
            "namePlacement": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 7 },
                  { "color": "green", "value": 30 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
