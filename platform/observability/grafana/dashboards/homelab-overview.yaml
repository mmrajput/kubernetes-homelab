apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Public
data:
  homelab-overview.json: |
    {
      "title": "Homelab Kubernetes cluster",
      "uid": "homelab-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "tags": ["homelab", "kubernetes"],
      "panels": [
        {
          "id": 1,
          "title": "Nodes ready",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 3 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "3": { "text": "3 / 3", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Nodes ready",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pods running",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Pods running",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "ArgoCD apps in sync",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 27 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "27": { "text": "27 / 27", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(argocd_app_info{sync_status=\"Synced\"})",
              "legendFormat": "Synced apps",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Cluster uptime",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.95 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "avg(avg_over_time(kube_node_status_condition{condition=\"Ready\",status=\"true\"}[90d]))",
              "legendFormat": "Uptime",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "CPU usage per node",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 4, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true,
            "minVizWidth": 8,
            "namePlacement": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "A" },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "${__field.labels.instance}"
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "label_replace((100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)) * on(instance) group_left(node) label_replace(kube_node_info, \"instance\", \"$1:9100\", \"internal_ip\", \"(.+)\"), \"instance\", \"$1\", \"node\", \"(.+)\")",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Memory usage per node",
          "type": "bargauge",
          "gridPos": { "x": 8, "y": 4, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true,
            "minVizWidth": 8,
            "namePlacement": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.70 },
                  { "color": "red", "value": 0.90 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "label_replace((1 - (avg by(instance)(node_memory_MemAvailable_bytes) / avg by(instance)(node_memory_MemTotal_bytes))) * on(instance) group_left(node) label_replace(kube_node_info, \"instance\", \"$1:9100\", \"internal_ip\", \"(.+)\"), \"instance\", \"$1\", \"node\", \"(.+)\")",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Longhorn storage used",
          "type": "stat",
          "gridPos": { "x": 16, "y": 4, "w": 4, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.70 },
                  { "color": "red", "value": 0.90 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(longhorn_node_storage_usage_bytes) / sum(longhorn_node_storage_capacity_bytes)",
              "legendFormat": "Storage used",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Longhorn volumes",
          "type": "stat",
          "gridPos": { "x": 20, "y": 4, "w": 4, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(longhorn_volume_robustness == 1)",
              "legendFormat": "Healthy volumes",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Application Health",
          "type": "row",
          "gridPos": { "x": 0, "y": 10, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 10,
          "title": "Nextcloud",
          "type": "stat",
          "gridPos": { "x": 0, "y": 11, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "1": { "text": "Healthy", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "Down", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "kube_pod_status_ready{namespace=\"nextcloud-production\",condition=\"true\",pod=~\"nextcloud-production-[0-9a-f]+-[0-9a-z]+\"}",
              "legendFormat": "Nextcloud",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "CNPG prod clusters",
          "type": "stat",
          "gridPos": { "x": 6, "y": 11, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "4": { "text": "4 / 4 Healthy", "color": "green" } } },
                { "type": "value", "options": { "3": { "text": "3 / 4 Degraded", "color": "yellow" } } },
                { "type": "value", "options": { "2": { "text": "2 / 4 Degraded", "color": "yellow" } } },
                { "type": "value", "options": { "1": { "text": "1 / 4 Critical", "color": "red" } } },
                { "type": "value", "options": { "0": { "text": "Down", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 4 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(cnpg_collector_up{cluster=~\"nextcloud-prod-db|keycloak-db\"})",
              "legendFormat": "Instances up",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "title": "Keycloak",
          "type": "stat",
          "gridPos": { "x": 12, "y": 11, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "1": { "text": "Healthy", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "Down", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_ready{namespace=\"keycloak\",condition=\"true\"})",
              "legendFormat": "Keycloak",
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "title": "Vault",
          "type": "stat",
          "gridPos": { "x": 18, "y": 11, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "1": { "text": "Unsealed", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "Sealed", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "kube_pod_status_ready{namespace=\"vault\",pod=\"vault-0\",condition=\"true\"}",
              "legendFormat": "Vault",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "title": "Backup Pipeline",
          "type": "row",
          "gridPos": { "x": 0, "y": 15, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 15,
          "title": "Velero — MinIO (default)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 3, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "1": { "text": "Available", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "Unavailable", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "velero_backup_location_status_gauge{backup_location_name=\"default\"}",
              "legendFormat": "MinIO",
              "refId": "A"
            }
          ]
        },
        {
          "id": 16,
          "title": "Velero backups",
          "type": "table",
          "gridPos": { "x": 3, "y": 16, "w": 7, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Schedule", "desc": false }]
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Status" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "1": { "text": "Succeeded", "color": "green" } } },
                      { "type": "value", "options": { "0": { "text": "Failed", "color": "red" } } }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Last Success" },
                "properties": [
                  { "id": "unit", "value": "dateTimeFromNow" }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "Time": "",
                  "schedule": "Schedule",
                  "Value #A": "Status",
                  "Value #B": "Last Success"
                },
                "excludeByName": {
                  "Time": true
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "velero_backup_last_status{schedule=~\"velero-nightly-full|velero-nextcloud-files\"}",
              "legendFormat": "{{schedule}}",
              "refId": "A",
              "instant": true
            },
            {
              "expr": "velero_backup_last_successful_timestamp{schedule=~\"velero-nightly-full|velero-nextcloud-files\"}",
              "legendFormat": "{{schedule}}",
              "refId": "B",
              "instant": true
            }
          ]
        },
        {
          "id": 17,
          "title": "CNPG WAL archiving",
          "type": "table",
          "gridPos": { "x": 10, "y": 16, "w": 7, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Cluster", "desc": false }]
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Pending" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 1 },
                        { "color": "red", "value": 5 }
                      ]
                    }
                  },
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "Time": "",
                  "cluster": "Cluster",
                  "Value #A": "Archived",
                  "Value #B": "Pending"
                },
                "excludeByName": {
                  "Time": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "service": true,
                  "value": true
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "sum by (cluster) (cnpg_collector_pg_wal_archive_status{value=\"done\"})",
              "legendFormat": "{{cluster}}",
              "refId": "A",
              "instant": true
            },
            {
              "expr": "sum by (cluster) (cnpg_collector_pg_wal_archive_status{value=\"ready\"})",
              "legendFormat": "{{cluster}}",
              "refId": "B",
              "instant": true
            }
          ]
        },
        {
          "id": 18,
          "title": "OneDrive sync",
          "type": "table",
          "gridPos": { "x": 17, "y": 16, "w": 7, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Target", "desc": false }]
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Status" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "1": { "text": "Synced", "color": "green" } } },
                      { "type": "value", "options": { "0": { "text": "Failed", "color": "red" } } }
                    ]
                  }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "Time": "",
                  "sync_target": "Target",
                  "Value #A": "Status"
                },
                "excludeByName": {
                  "Time": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "service": true,
                  "job_name": true
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "max by (sync_target) (label_replace(kube_job_status_succeeded{namespace=\"velero\",job_name=~\"minio-onedrive-sync-.+\"}, \"sync_target\", \"$1\", \"job_name\", \"minio-onedrive-sync-([a-z]+)-.*\"))",
              "legendFormat": "{{sync_target}}",
              "refId": "A",
              "instant": true
            }
          ]
        }
      ]
    }
