apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Public
data:
  homelab-overview.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "type": "datasource",
          "pluginId": "prometheus"
        },
        {
          "name": "DS_LOKI",
          "label": "Loki",
          "type": "datasource",
          "pluginId": "loki"
        }
      ],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" },
        { "type": "datasource", "id": "loki", "name": "Loki", "version": "1.0.0" }
      ],
      "title": "Homelab Kubernetes Cluster",
      "uid": "homelab-overview",
      "editable": false,
      "schemaVersion": 38,
      "version": 4,
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "timezone": "browser",
      "tags": ["homelab", "kubernetes", "sre"],
      "templating": { "list": [] },
      "panels": [
        {
          "id": 1,
          "title": "Nodes ready",
          "description": "Count of nodes reporting Ready condition. Drops below 3 trigger immediate investigation.",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 3 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) or vector(0)",
              "legendFormat": "Nodes ready",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pods running",
          "description": "Total pods in Running phase across all namespaces.",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)",
              "legendFormat": "Pods running",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "ArgoCD out of sync",
          "description": "Applications not in Synced state. Zero means all apps are healthy. Counts dynamically — no hardcoded total.",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "All synced", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(argocd_app_info{sync_status!=\"Synced\"}) or vector(0)",
              "legendFormat": "Out of sync",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Cluster uptime (30d)",
          "description": "Fraction of time all nodes reported Ready over the rolling 30-day window. Fixed window — independent of dashboard time range.",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.95 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "min(avg_over_time(kube_node_status_condition{condition=\"Ready\",status=\"true\"}[30d]))",
              "legendFormat": "Uptime",
              "refId": "A"
            }
          ]
        },
        {
          "id": 28,
          "title": "Alerts — CRITICAL",
          "description": "Firing Prometheus alerts at critical severity. Any non-zero value requires immediate action.",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "None", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\",severity=\"critical\",alertname!~\"KubeControllerManagerDown|KubeSchedulerDown|KubeProxyDown|etcdInsufficientMembers\"}) or vector(0)",
              "legendFormat": "Critical",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 29,
          "title": "Alerts — WARNING",
          "description": "Firing Prometheus alerts at warning severity. Investigate before they escalate.",
          "type": "stat",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "None", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\",severity=\"warning\"}) or vector(0)",
              "legendFormat": "Warning",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 30,
          "title": "Infrastructure Resources",
          "description": "Node CPU and memory utilization, cluster-wide scheduling pressure, storage health, and workload stability signals.",
          "type": "row",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 5,
          "title": "CPU usage per node",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 5, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true,
            "minVizWidth": 8,
            "namePlacement": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "A" },
                "properties": [
                  { "id": "displayName", "value": "${__field.labels.instance}" }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "label_replace((100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)) * on(instance) group_left(node) label_replace(kube_node_info, \"instance\", \"$1:9100\", \"internal_ip\", \"(.+)\"), \"instance\", \"$1\", \"node\", \"(.+)\")",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Memory usage per node",
          "type": "bargauge",
          "gridPos": { "x": 8, "y": 5, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true,
            "minVizWidth": 8,
            "namePlacement": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.70 },
                  { "color": "red", "value": 0.90 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "A" },
                "properties": [
                  { "id": "displayName", "value": "${__field.labels.instance}" }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "label_replace((1 - (avg by(instance)(node_memory_MemAvailable_bytes) / avg by(instance)(node_memory_MemTotal_bytes))) * on(instance) group_left(node) label_replace(kube_node_info, \"instance\", \"$1:9100\", \"internal_ip\", \"(.+)\"), \"instance\", \"$1\", \"node\", \"(.+)\")",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 31,
          "title": "CPU requests pressure",
          "description": "CPU cores requested by all pods vs total allocatable. Above 80% means scheduler has limited headroom.",
          "type": "stat",
          "gridPos": { "x": 16, "y": 5, "w": 4, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.70 },
                  { "color": "red", "value": 0.90 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\",unit=\"core\"} unless on(node) kube_node_role{role=\"control-plane\"}) / sum(kube_node_status_allocatable{resource=\"cpu\"} unless on(node) kube_node_role{role=\"control-plane\"})",
              "legendFormat": "CPU requests",
              "refId": "A"
            }
          ]
        },
        {
          "id": 32,
          "title": "Memory requests pressure",
          "description": "Memory requested by all pods vs total allocatable. Above 80% means scheduler has limited headroom.",
          "type": "stat",
          "gridPos": { "x": 20, "y": 5, "w": 4, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.70 },
                  { "color": "red", "value": 0.90 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\",unit=\"byte\"} unless on(node) kube_node_role{role=\"control-plane\"}) / sum(kube_node_status_allocatable{resource=\"memory\"} unless on(node) kube_node_role{role=\"control-plane\"})",
              "legendFormat": "Memory requests",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Longhorn storage used",
          "type": "stat",
          "gridPos": { "x": 16, "y": 8, "w": 4, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.70 },
                  { "color": "red", "value": 0.90 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "(sum(longhorn_node_storage_usage_bytes) or vector(0)) / (sum(longhorn_node_storage_capacity_bytes) or vector(1))",
              "legendFormat": "Storage used",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Longhorn volumes healthy",
          "type": "stat",
          "gridPos": { "x": 20, "y": 8, "w": 4, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(longhorn_volume_robustness == 1)",
              "legendFormat": "Healthy volumes",
              "refId": "A"
            }
          ]
        },
        {
          "id": 33,
          "title": "Pending pods",
          "description": "Pods stuck in Pending phase. Non-zero indicates scheduling failure, resource exhaustion, or unbound PVCs.",
          "type": "stat",
          "gridPos": { "x": 0, "y": 11, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "None", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Pending\"} == 1) or vector(0)",
              "legendFormat": "Pending",
              "refId": "A"
            }
          ]
        },
        {
          "id": 34,
          "title": "OOMKilled containers",
          "description": "Containers whose last termination was OOMKilled. Signals memory limits need tuning.",
          "type": "stat",
          "gridPos": { "x": 4, "y": 11, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "None", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\"}) or vector(0)",
              "legendFormat": "OOMKilled",
              "refId": "A"
            }
          ]
        },
        {
          "id": 36,
          "title": "API server 5xx rate",
          "description": "Rate of 5xx responses from kube-apiserver. Non-zero values indicate control plane instability.",
          "type": "stat",
          "gridPos": { "x": 8, "y": 11, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.001 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "None", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "sum(rate(apiserver_request_total{code=~\"5..\"}[5m])) or vector(0)",
              "legendFormat": "5xx / s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 47,
          "title": "Container restarts (1h)",
          "description": "Total container restart increments across the cluster in the last hour. Elevated counts indicate a crash loop.",
          "type": "stat",
          "gridPos": { "x": 12, "y": 11, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "None", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total[1h]))",
              "legendFormat": "Restarts",
              "refId": "A"
            }
          ]
        },
        {
          "id": 48,
          "title": "Pods failed / unknown",
          "description": "Pods in Failed or Unknown phase. Should always be zero in a healthy cluster.",
          "type": "stat",
          "gridPos": { "x": 16, "y": 11, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "None", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=~\"Failed|Unknown\"} == 1) or vector(0)",
              "legendFormat": "Failed/Unknown",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Application Health",
          "description": "Readiness status of core platform services: workloads, databases, identity, secrets, and CI runners.",
          "type": "row",
          "gridPos": { "x": 0, "y": 15, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 10,
          "title": "Nextcloud",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "1": { "text": "Healthy", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "Down", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "min(kube_pod_status_ready{namespace=\"nextcloud-production\",condition=\"true\",pod=~\"nextcloud-production-[0-9a-f]+-[0-9a-z]+\"})",
              "legendFormat": "Nextcloud",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "title": "Keycloak",
          "type": "stat",
          "gridPos": { "x": 6, "y": 16, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
