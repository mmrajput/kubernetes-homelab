          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "spanNulls": false,
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
