apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Public
data:
  homelab-overview.json: |
    {
      "title": "Homelab Kubernetes cluster",
      "uid": "homelab-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "tags": ["homelab", "kubernetes"],
      "panels": [
        {
          "id": 1,
          "title": "Nodes ready",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 3 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "3": { "text": "3 / 3", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Nodes ready",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pods running",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Pods running",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "ArgoCD apps in sync",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 27 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "27": { "text": "27 / 27", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(argocd_app_info{sync_status=\"Synced\"})",
              "legendFormat": "Synced apps",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Cluster uptime",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.95 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "avg(avg_over_time(kube_node_status_condition{condition=\"Ready\",status=\"true\"}[90d]))",
              "legendFormat": "Uptime",
              "refId": "A"
            }
          ]
        }
      ]
    }