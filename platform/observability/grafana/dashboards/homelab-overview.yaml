apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Public
data:
  homelab-overview.json: |
    {
      "title": "Homelab Kubernetes cluster",
      "uid": "homelab-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "tags": ["homelab", "kubernetes"],
      "panels": [
        {
          "id": 1,
          "title": "Nodes ready",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 3 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "3": { "text": "3 / 3", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Nodes ready",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pods running",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Pods running",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "ArgoCD apps in sync",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 27 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "27": { "text": "27 / 27", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(argocd_app_info{sync_status=\"Synced\"})",
              "legendFormat": "Synced apps",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Cluster uptime",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.95 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "avg(avg_over_time(kube_node_status_condition{condition=\"Ready\",status=\"true\"}[90d]))",
              "legendFormat": "Uptime",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "CPU usage per node",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 4, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true,
            "minVizWidth": 8,
            "namePlacement": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "A" },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "${__field.labels.instance}"
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "label_replace((100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)) * on(instance) group_left(node) label_replace(kube_node_info, \"instance\", \"$1:9100\", \"internal_ip\", \"(.+)\"), \"instance\", \"$1\", \"node\", \"(.+)\")",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Memory usage per node",
          "type": "bargauge",
          "gridPos": { "x": 8, "y": 4, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true,
            "minVizWidth": 8,
            "namePlacement": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.70 },
                  { "color": "red", "value": 0.90 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "label_replace((1 - (avg by(instance)(node_memory_MemAvailable_bytes) / avg by(instance)(node_memory_MemTotal_bytes))) * on(instance) group_left(node) label_replace(kube_node_info, \"instance\", \"$1:9100\", \"internal_ip\", \"(.+)\"), \"instance\", \"$1\", \"node\", \"(.+)\")",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Longhorn storage used",
          "type": "stat",
          "gridPos": { "x": 16, "y": 4, "w": 4, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.70 },
                  { "color": "red", "value": 0.90 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(longhorn_node_storage_usage_bytes) / sum(longhorn_node_storage_capacity_bytes)",
              "legendFormat": "Storage used",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Longhorn volumes",
          "type": "stat",
          "gridPos": { "x": 20, "y": 4, "w": 4, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(longhorn_volume_robustness == 1)",
              "legendFormat": "Healthy volumes",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Application Health",
          "type": "row",
          "gridPos": { "x": 0, "y": 10, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 10,
          "title": "Nextcloud",
          "type": "stat",
          "gridPos": { "x": 0, "y": 11, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 1.0 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_ready{namespace=\"nextcloud-production\",condition=\"true\"}) / count(kube_pod_status_ready{namespace=\"nextcloud-production\"})",
              "legendFormat": "Pods ready",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "CNPG prod clusters",
          "type": "stat",
          "gridPos": { "x": 6, "y": 11, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 4 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(cnpg_collector_up{cluster=~\"nextcloud-prod-db|keycloak-db\"})",
              "legendFormat": "Instances up",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "title": "Keycloak",
          "type": "stat",
          "gridPos": { "x": 12, "y": 11, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_ready{namespace=\"keycloak\",condition=\"true\"})",
              "legendFormat": "Pods ready",
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "title": "Vault",
          "type": "stat",
          "gridPos": { "x": 18, "y": 11, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "kube_pod_status_ready{namespace=\"vault\",pod=\"vault-0\",condition=\"true\"}",
              "legendFormat": "Vault unsealed",
              "refId": "A"
            }
          ]
        }
      ]
    }