        {
          "id": 50,
          "title": "Resource Trends",
          "description": "CPU and memory utilisation over time per node — useful for spotting gradual leaks or sudden spikes.",
          "type": "row",
          "gridPos": { "x": 0, "y": 45, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 51,
          "title": "CPU utilisation over time",
          "description": "Per-node CPU % over the dashboard time range.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 46, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "spanNulls": false,
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "label_replace((100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)) * on(instance) group_left(node) label_replace(kube_node_info, \"instance\", \"$1:9100\", \"internal_ip\", \"(.+)\"), \"instance\", \"$1\", \"node\", \"(.+)\")",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
