# Grafana Helm Values for Homelab
# Chart: grafana/grafana

# Recreate strategy: terminate old pod before starting new one.
# Required for RWO Longhorn volumes — RollingUpdate causes Multi-Attach deadlock
# when the new pod schedules on a different node than the old pod.
deploymentStrategy:
  type: Recreate

# Admin credentials
adminUser: admin
adminPassword: CHANGEME

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Persistence for dashboards and configs
persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""  # Use default (local-path)

# CRITICAL: Disable the failing init container
initChownData:
  enabled: false

# Set proper security context
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

podSecurityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

# Ingress configuration
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
  hosts:
    - grafana.mmrajputhomelab.org
  path: /
  pathType: Prefix

# Data sources - automatically configured
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 30s
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        jsonData:
          maxLines: 1000

# Dashboard providers
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
      # Sidecar-managed provider: foldersFromFilesStructure maps subdirectory names
      # to Grafana folders automatically.
      # e.g. /tmp/dashboards/Public → Public folder
      #      /tmp/dashboards/Kubernetes → Kubernetes folder
      - name: 'sidecar'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: false
        options:
          path: /tmp/dashboards
          foldersFromFilesStructure: true

# Sidecar: watches for ConfigMaps labelled grafana_dashboard=1 across all
# namespaces and drops them into /tmp/dashboards for the provider above.
# kube-prometheus-stack creates these ConfigMaps via forceDeployDashboards.
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
      allowUiUpdates: false

# grafana-lokiexplore-app: bundled with Grafana 10.x — listed here to prevent
# the background installer from trying to download it and failing with
# "cannot recognize as plugin folder" against the embedded binary path
plugins:
  - grafana-lokiexplore-app

# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  labels:
    release: prometheus

# Security settings
envFromSecret: grafana-oidc-secret

grafana.ini:
  server:
    root_url: https://grafana.mmrajputhomelab.org
  public_dashboards:
    enabled: true
  security:
    allow_embedding: true
    cookie_secure: true
    cookie_samesite: lax

  auth.anonymous:
    enabled: false

  auth:
    disable_login_form: false
    oauth_auto_login: false

  users:
    allow_sign_up: false
    auto_assign_org: true
    auto_assign_org_role: Viewer

  auth.generic_oauth:
    enabled: true
    name: Keycloak
    allow_sign_up: true
    client_id: grafana
    client_secret: $__env{client_secret}
    scopes: openid profile email groups
    auth_url: https://keycloak.mmrajputhomelab.org/realms/homelab/protocol/openid-connect/auth
    token_url: https://keycloak.mmrajputhomelab.org/realms/homelab/protocol/openid-connect/token
    api_url: https://keycloak.mmrajputhomelab.org/realms/homelab/protocol/openid-connect/userinfo
    use_pkce: true
    role_attribute_path: contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-editors') && 'Editor' || 'Viewer'
    role_attribute_strict: false
    allow_assign_grafana_admin: true

# Token mounting required: the grafana-sc-dashboard sidecar uses the in-cluster
# Kubernetes client to watch ConfigMaps (grafana_dashboard=1) across all namespaces.
# Without the token the sidecar exits immediately with "Service token file does not exist."
serviceAccount:
  create: true
  automountServiceAccountToken: true

automountServiceAccountToken: true