# nginx-ingress Helm Values for Homelab
# Chart: ingress-nginx

controller:
  config:
    # Disables the automatic redirect from HTTP to HTTPS
    ssl-redirect: "false"
    # Ensures Nginx doesn't try to force HSTS headers which can confuse Cloudflare
    hsts: "false"
    # Use forwarded headers from cloudflared to see original client IPs
    use-forwarded-headers: "true"  
  # NodePort service (no LoadBalancer in homelab)
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443
  
  # Set as default IngressClass
  ingressClassResource:
    default: true
  
  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Metrics for Prometheus (Phase 5)
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false  # Enable when Prometheus installed
