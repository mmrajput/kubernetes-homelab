# nginx-ingress Helm Values for Homelab
# Chart: ingress-nginx

controller:
  extraArgs:
    default-ssl-certificate: "ingress-nginx/wildcard-homelab-tls"
  admissionWebhooks:
    enabled: false

  config:
    # TLS is terminated at Cloudflare edge - do not redirect HTTP to HTTPS
    ssl-redirect: "false"
    force-ssl-redirect: "false"
    # HSTS disabled - Cloudflare manages this at the edge
    hsts: "false"
    # Cloudflare Tunnel sets X-Forwarded-For - nginx must trust and propagate it
    use-forwarded-headers: "true"
    # ArgoCD sends large headers (JWT tokens) - default 4k buffer causes 502s
    proxy-buffer-size: "16k"
    proxy-buffers: "4 16k"

  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  ingressClassResource:
    default: true

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true