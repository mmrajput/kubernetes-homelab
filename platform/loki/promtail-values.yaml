# Promtail Helm Values for Homelab
# Chart: grafana/promtail

# DaemonSet - runs on all nodes
daemonset:
  enabled: true

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# Loki endpoint (internal service)
config:
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  
# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  labels:
    release: prometheus
