# Loki Helm Values for Homelab
# Chart: grafana/loki
# Deployment mode: single binary (simple for homelab)
deploymentMode: SingleBinary
loki:
  # Storage configuration - MinIO S3 backend
  storage:
    type: s3
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki
    s3:
      endpoint: http://minio.minio.svc.cluster.local:9000
      region: local
      s3ForcePathStyle: true
      insecure: true
      # Credentials injected via AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY
      # environment variables from loki-minio-credentials secret
  # Pod Security Context - restricted PSS compliance
  podSecurityContext:
    fsGroup: 10001
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 10001
    runAsNonRoot: true
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault
  # Container Security Context - restricted PSS compliance
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  # Schema configuration
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  compactor:
    retention_enabled: true
    working_directory: /var/loki/compactor
    delete_request_store: s3
  # Common configuration
  commonConfig:
    replication_factor: 1
  # Authentication disabled (internal cluster only)
  auth_enabled: false
  # Limits
  limits_config:
    retention_period: 168h
    max_query_series: 1000
    max_query_lookback: 168h
# Single binary deployment
singleBinary:
  replicas: 1
  # Resource limits for homelab
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Secret reference
  extraEnvFrom:
    - secretRef:
        name: loki-minio-credentials
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: loki-minio-credentials
          key: accessKey
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-minio-credentials
          key: secretKey
  # Persistence for WAL and compactor only - chunks go to MinIO
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "local-path"
# CRITICAL: Explicitly disable cache components
chunksCache:
  enabled: false
  replicas: 0
resultsCache:
  enabled: false
  replicas: 0
# Disable microservices components
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
# Gateway (not needed for single binary)
gateway:
  enabled: false
# Monitoring (ServiceMonitor for Prometheus)
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
# Loki Canary (disabled to save resources)
lokiCanary:
  enabled: false
# Test pods (disabled)
test:
  enabled: false