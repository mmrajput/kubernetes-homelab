apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: databases-default-deny
  namespace: databases
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: databases-allow
  namespace: databases
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Keycloak application to reach PostgreSQL
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 5432
          protocol: TCP
    # Allow Wiki.js staging to reach PostgreSQL
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wikijs-staging
      ports:
        - port: 5432
          protocol: TCP
    # Allow Wiki.js production to reach PostgreSQL
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wikijs-production
      ports:
        - port: 5432
          protocol: TCP
    # Allow intra-namespace traffic (CNPG primary to standby replication)
    - from:
        - podSelector: {}
      ports:
        - port: 5432
          protocol: TCP
    # Allow CNPG operator to collect status from database pods
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow CNPG to write WAL and base backups to MinIO
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - port: 9000
          protocol: TCP
    # Allow Kubernetes API server access (CNPG operator communication)
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32
      ports:
        - port: 443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 6443
          protocol: TCP