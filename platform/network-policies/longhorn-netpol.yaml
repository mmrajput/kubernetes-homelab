apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longhorn-default-deny
  namespace: longhorn-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longhorn-allow
  namespace: longhorn-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow nginx-ingress to reach Longhorn UI
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
    # Allow Prometheus to scrape Longhorn metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9500
          protocol: TCP
    # Allow Kubernetes API server to reach Longhorn admission webhook
    # API server originates from control plane node IP
    - from:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 9500
          protocol: TCP
        - port: 9502
          protocol: TCP
    # Allow intra-namespace communication
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: longhorn-system
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Kubernetes API server access
    # Both ClusterIP and control plane node IP needed for Calico DNAT
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32       # kubernetes service ClusterIP
        - ipBlock:
            cidr: 192.168.178.34/32  # control plane node IP (post-DNAT)
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Allow access to worker node kubelet for disk operations
    - to:
        - ipBlock:
            cidr: 192.168.178.35/32
      ports:
        - port: 10250
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 192.168.178.36/32
      ports:
        - port: 10250
          protocol: TCP
    # Allow intra-namespace communication
    # namespaceSelector handles ClusterIP traffic correctly unlike podSelector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: longhorn-system