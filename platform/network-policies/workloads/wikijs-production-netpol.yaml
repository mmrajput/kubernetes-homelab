apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wikijs-production-default-deny
  namespace: wikijs-production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wikijs-production-allow
  namespace: wikijs-production
  annotations:
    # Wiki.js locale sync and graph endpoint calls will fail under this policy.
    # This is intentional — no egress to external endpoints is permitted.
    # Wiki.js functions fully with built-in English locale.
    # Consistent with DSGVO data residency and network isolation requirements.
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress-nginx to reach Wiki.js pod
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
    # Allow Prometheus to scrape Wiki.js metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Wiki.js to reach PostgreSQL in databases namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: databases
      ports:
        - port: 5432
          protocol: TCP