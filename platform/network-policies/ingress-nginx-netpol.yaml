apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-nginx-default-deny
  namespace: ingress-nginx
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-nginx-allow
  namespace: ingress-nginx
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from cloudflared pods in cloudflare namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudflare
      ports:
        - port: 80   # HTTP
          protocol: TCP
        - port: 443  # HTTPS
          protocol: TCP
    # Allow Prometheus to scrape nginx metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 10254  # nginx-ingress metrics
          protocol: TCP

    # Allow API server to reach nginx admission webhook
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8443
          protocol: TCP

  egress:
    # Allow DNS resolution via kube-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53  # DNS UDP
          protocol: UDP
        - port: 53  # DNS TCP
          protocol: TCP
    # Allow access to Kubernetes API server
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32
      ports:
        - port: 443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 6443
          protocol: TCP
    # Allow forwarding to platform namespace (ArgoCD)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
      ports:
        - port: 80    # HTTP
          protocol: TCP
        - port: 443   # HTTPS
          protocol: TCP
        - port: 8080  # ArgoCD server HTTP
          protocol: TCP
    # Allow forwarding to monitoring namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000  # Grafana pod port
          protocol: TCP
        - port: 8080  # Prometheus web UI pod port
          protocol: TCP
        - port: 9090  # Prometheus metrics pod port
          protocol: TCP
        - port: 9093  # Alertmanager pod port
          protocol: TCP
        - port: 3100  # Loki pod port
          protocol: TCP
    
    # Allow forwarding to longhorn-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: longhorn-system
      ports:
        - port: 8000  # Longhorn UI pod port
          protocol: TCP

    # Allow forwarding to minio namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - port: 9000
          protocol: TCP
        - port: 9001
          protocol: TCP

    # Allow forwarding to vault namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - port: 8200  # Vault pod port
          protocol: TCP
    
    # Allow forwarding to keycloak namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 8080  # Keycloak HTTP pod port
          protocol: TCP

    # Allow webhook validation calls to itself
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8443  # nginx admission webhook
          protocol: TCP
    # Allow forwarding to homepage namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: homepage
      ports:
        - port: 3000  # Homepage pod port
          protocol: TCP
