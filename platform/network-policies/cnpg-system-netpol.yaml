apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-system-default-deny
  namespace: cnpg-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-system-allow
  namespace: cnpg-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow kube-apiserver to reach CNPG webhook
    # API server runs on host network - must use ipBlock not namespaceSelector
    - from:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 9443
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow CNPG operator to reach database pods for status collection and management
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: databases
      ports:
        - port: 8000
          protocol: TCP
        - port: 5432
          protocol: TCP
    # Allow Kubernetes API server access
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32
      ports:
        - port: 443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 6443
          protocol: TCP
