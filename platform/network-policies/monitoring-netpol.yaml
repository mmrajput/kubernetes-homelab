  podSelector:
    matchLabels:
      app.kubernetes.io/name: promtail
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape Promtail metrics
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
