apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-default-deny
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Grafana
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-grafana-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress-nginx to reach Grafana
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000  # Grafana pod port
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53  # DNS UDP
          protocol: UDP
        - port: 53  # DNS TCP
          protocol: TCP
    # Allow Grafana to query Prometheus
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 9090  # Prometheus metrics
          protocol: TCP
    # Allow Grafana to query Loki
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - port: 3100  # Loki HTTP
          protocol: TCP
---
# Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-prometheus-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress-nginx to reach Prometheus
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 9090  # Prometheus web UI
          protocol: TCP
        - port: 8080  # Prometheus web UI alternate
          protocol: TCP
    # Allow Grafana to query Prometheus
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - port: 9090  # Prometheus metrics
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53  # DNS UDP
          protocol: UDP
        - port: 53  # DNS TCP
          protocol: TCP
    # Allow Prometheus to scrape all namespaces
    - to:
        - namespaceSelector: {}
      ports:
        - port: 9090  # Prometheus
          protocol: TCP
        - port: 8080  # kube-state-metrics
          protocol: TCP
        - port: 9100  # node-exporter
          protocol: TCP
        - port: 10254 # ingress-nginx metrics
          protocol: TCP
        - port: 3100  # Loki metrics
          protocol: TCP
        - port: 3101  # Promtail metrics
          protocol: TCP
    # Allow Prometheus to send alerts to Alertmanager
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - port: 9093  # Alertmanager
          protocol: TCP
    # Allow Prometheus to reach Kubernetes API
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 6443  # Kubernetes API
          protocol: TCP
---
# Alertmanager
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-alertmanager-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress-nginx to reach Alertmanager
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 9093  # Alertmanager port
          protocol: TCP
        - port: 8080  # Alertmanager web UI
          protocol: TCP
    # Allow Prometheus to send alerts
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 9093  # Alertmanager port
          protocol: TCP
    # Allow Alertmanager cluster communication
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - port: 9094  # Alertmanager cluster port
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53  # DNS UDP
          protocol: UDP
        - port: 53  # DNS TCP
          protocol: TCP
    # Allow Alertmanager cluster communication
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - port: 9094  # Alertmanager cluster port
          protocol: TCP
    # Allow Alertmanager to send notifications externally
    - ports:
        - port: 443  # HTTPS for webhooks/email
          protocol: TCP
---
# Loki
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-loki-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Grafana to query Loki
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - port: 3100  # Loki HTTP
          protocol: TCP
    # Allow Promtail to push logs
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: promtail
      ports:
        - port: 3100  # Loki HTTP
          protocol: TCP
    # Allow Prometheus to scrape Loki metrics
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 3100  # Loki metrics
          protocol: TCP
    # Allow Loki memberlist communication
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - port: 7946  # Loki memberlist
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53  # DNS UDP
          protocol: UDP
        - port: 53  # DNS TCP
          protocol: TCP
    # Allow Loki memberlist communication
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - port: 7946  # Loki memberlist
          protocol: TCP
---
