apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-default-deny
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress-nginx to reach all monitoring services
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow intra-namespace communication (Prometheus → Alertmanager, Grafana → Loki etc.)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53  # DNS UDP
          protocol: UDP
        - port: 53  # DNS TCP
          protocol: TCP
    # Allow intra-namespace communication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Allow scraping metrics from all namespaces
    - to:
        - namespaceSelector: {}
      ports:
        - port: 9100   # node-exporter
          protocol: TCP
        - port: 10254  # ingress-nginx metrics
          protocol: TCP
        - port: 3101   # promtail metrics
          protocol: TCP
    # Allow reaching Kubernetes API for service discovery
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32  # kubernetes service ClusterIP
      ports:
        - port: 443  # Kubernetes API
          protocol: TCP
    # Allow external notifications (Alertmanager webhooks)
    - ports:
        - port: 443  # HTTPS
          protocol: TCP