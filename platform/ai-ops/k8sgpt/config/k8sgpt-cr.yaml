apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt
  namespace: k8sgpt
spec:
  # AI backend: Ollama running qwen2.5:3b in the same namespace
  # Model is pulled on first startup via ollama-model-pull-job PostSync hook
  ai:
    enabled: true
    model: qwen2.5:3b
    # "ollama" is not a valid enum in operator 0.2.27; use "localai" which
    # targets any OpenAI-compatible API — Ollama's /v1 endpoint qualifies
    backend: localai
    baseUrl: http://ollama.k8sgpt.svc.cluster.local:11434/v1
    # Secret is mandatory for k8sgpt runner auth config; Ollama needs no real
    # credentials so a dummy key is used
    secret:
      name: k8sgpt-ollama-secret
      key: openai-api-key
  # version is required — specifies the ghcr.io/k8sgpt-ai/k8sgpt image tag
  version: v0.3.48
  noCache: false
  # filters: [] means all default analyzers run (Pods, Services, Ingress, etc.)
  filters: []
