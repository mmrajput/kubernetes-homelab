apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt
  namespace: k8sgpt
spec:
  # AI backend disabled — runner scans the cluster and stores raw Result CRs
  # without AI explanation. Use scripts/explain-result.sh or scripts/explain-log.sh
  # to send findings to Ollama running locally in the devcontainer.
  ai:
    enabled: false
  # version is required — specifies the ghcr.io/k8sgpt-ai/k8sgpt image tag
  version: v0.3.48
  noCache: false
  # filters: [] means all default analyzers run (Pods, Services, Ingress, etc.)
  filters: []
