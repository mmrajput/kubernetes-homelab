apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-qwen2-5-3b
  namespace: k8sgpt
  annotations:
    # Runs after k8sgpt-config Application syncs; deleted on success
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  # qwen2.5:3b is ~2 GB; allow 30 min for slow links
  activeDeadlineSeconds: 1800
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/component: model-pull
    spec:
      restartPolicy: OnFailure
      # Uses curl to call Ollama's REST pull API directly.
      # Ollama handles its own internet egress; this pod only needs in-cluster access.
      containers:
        - name: pull
          image: docker.io/curlimages/curl:8.6.0
          command:
            - sh
            - -c
            - |
              set -e
              OLLAMA=http://ollama.k8sgpt.svc.cluster.local:11434
              echo "Waiting for Ollama to be ready..."
              until curl -sf "${OLLAMA}/api/version" > /dev/null 2>&1; do
                echo "  not ready, retrying in 10s..."
                sleep 10
              done
              echo "Ollama ready. Pulling qwen2.5:3b (streaming progress)..."
              curl -f --no-buffer -m 3600 \
                -X POST "${OLLAMA}/api/pull" \
                -H 'Content-Type: application/json' \
                -d '{"name":"qwen2.5:3b"}'
              echo "Pull complete."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
