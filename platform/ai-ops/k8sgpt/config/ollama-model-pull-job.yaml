apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-qwen2-5-3b
  namespace: k8sgpt
  annotations:
    # Runs after k8sgpt-config Application syncs; deleted on success
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  # Generous deadline: qwen2.5:3b is ~2 GB, allow up to 30 min for slow links
  activeDeadlineSeconds: 1800
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: model-pull
    spec:
      restartPolicy: OnFailure
      # Job only calls Ollama's in-cluster API; Ollama handles its own internet egress
      containers:
        - name: pull
          image: docker.io/ollama/ollama:0.9.3
          command:
            - ollama
            - pull
            - qwen2.5:3b
          env:
            - name: OLLAMA_HOST
              value: http://ollama.k8sgpt.svc.cluster.local:11434
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
