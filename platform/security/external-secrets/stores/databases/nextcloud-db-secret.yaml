apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-initdb-secret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: nextcloud-initdb-secret
    creationPolicy: Owner
  data:
    # CNPG initdb requires keys named exactly 'username' and 'password' — not configurable
    - secretKey: username
      remoteRef:
        key: secret/data/databases/nextcloud
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/databases/nextcloud
        property: password
