apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-initdb-secret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-initdb-secret
    creationPolicy: Owner
  data:
    # CNPG initdb requires keys named exactly 'username' and 'password'
    - secretKey: username
      remoteRef:
        key: secret/data/databases/keycloak
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/databases/keycloak
        property: password