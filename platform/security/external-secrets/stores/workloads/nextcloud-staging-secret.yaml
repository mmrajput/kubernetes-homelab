apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-staging-secret
  namespace: nextcloud-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: nextcloud-staging-secret
    creationPolicy: Owner
  data:
    # Nextcloud admin account — consumed by nextcloud.existingSecret in Helm values
    - secretKey: nextcloud-username
      remoteRef:
        key: secret/data/nextcloud/admin
        property: username
    - secretKey: nextcloud-password
      remoteRef:
        key: secret/data/nextcloud/admin
        property: password
    # PostgreSQL credentials — consumed by externalDatabase.existingSecret in Helm values
    # Pulled from the same Vault path used for CNPG initdb, so credentials stay in sync
    - secretKey: db-username
      remoteRef:
        key: secret/data/databases/nextcloud
        property: username
    - secretKey: db-password
      remoteRef:
        key: secret/data/databases/nextcloud
        property: password
