apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wikijs-secrets
  namespace: wikijs-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: wikijs-secrets
    creationPolicy: Owner
  data:
    # PostgreSQL database credentials for Wiki.js
    # db-password prefix avoids collision with CNPG initdb secret key naming
    - secretKey: db-username
      remoteRef:
        key: secret/data/databases/wikijs
        property: username
    - secretKey: db-password
      remoteRef:
        key: secret/data/databases/wikijs
        property: password