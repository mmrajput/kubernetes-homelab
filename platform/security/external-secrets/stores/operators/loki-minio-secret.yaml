apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-minio-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: loki-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: accessKey
      remoteRef:
        key: secret/data/minio/loki
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: secret/data/minio/loki
        property: secretKey
