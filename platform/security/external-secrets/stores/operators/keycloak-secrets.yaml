apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-secrets
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-secrets
    creationPolicy: Owner
  data:
    # Keycloak admin credentials
    - secretKey: admin-user
      remoteRef:
        key: secret/data/keycloak/admin
        property: username
    - secretKey: admin-password
      remoteRef:
        key: secret/data/keycloak/admin
        property: password
        
    # PostgreSQL database credentials
    # db-username/db-password prefix avoids collision with CNPG initdb
    # which requires keys named exactly 'username' and 'password'
    - secretKey: db-username
      remoteRef:
        key: secret/data/databases/keycloak
        property: username
    - secretKey: db-password
      remoteRef:
        key: secret/data/databases/keycloak
        property: password