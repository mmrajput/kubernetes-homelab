apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-minio-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-minio-credentials
    creationPolicy: Owner
    template:
      data:
        # Velero AWS plugin expects credentials in AWS CLI file format
        # under the key named "cloud"
        cloud: |
          [default]
          aws_access_key_id={{ .access_key }}
          aws_secret_access_key={{ .secret_key }}
  data:
    - secretKey: access_key
      remoteRef:
        key: secret/data/minio/velero
        property: access-key
    - secretKey: secret_key
      remoteRef:
        key: secret/data/minio/velero
        property: secret-key
