apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rclone-config
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: rclone-config
    creationPolicy: Owner
    template:
      data:
        # rclone.conf constructed from individual Vault secrets.
        # [minio] — read-only service account scoped to velero + cnpg-backups buckets.
        # [onedrive] — OAuth token managed by rclone; refresh_token enables silent renewal.
        rclone.conf: |
          [minio]
          type = s3
          provider = Minio
          access_key_id={{ .minio_access_key }}
          secret_access_key={{ .minio_secret_key }}
          endpoint = http://minio.minio.svc.cluster.local:9000

          [onedrive]
          type = onedrive
          token={{ .onedrive_token }}
          drive_id={{ .onedrive_drive_id }}
          drive_type={{ .onedrive_drive_type }}
  data:
    - secretKey: minio_access_key
      remoteRef:
        key: secret/data/minio/rclone
        property: access-key
    - secretKey: minio_secret_key
      remoteRef:
        key: secret/data/minio/rclone
        property: secret-key
    - secretKey: onedrive_token
      remoteRef:
        key: secret/data/operators/rclone-onedrive
        property: token
    - secretKey: onedrive_drive_id
      remoteRef:
        key: secret/data/operators/rclone-onedrive
        property: drive_id
    - secretKey: onedrive_drive_type
      remoteRef:
        key: secret/data/operators/rclone-onedrive
        property: drive_type
