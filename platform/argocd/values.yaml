# ArgoCD Helm Values for Homelab
# Chart: argo-cd v9.3.0
# App: ArgoCD v3.2.3

global:
  domain: argocd.homelab.mmrajputhomelab.org

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.homelab.mmrajputhomelab.org
    annotations:
      # DISABLE the redirect that is causing 308 error
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      # Tell Nginx to talk to the ArgoCD Service via HTTP
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    path: /
    pathType: Prefix
    # Set this to false so Nginx doesn't look for a cert
    tls: false

  # CRITICAL: Tell ArgoCD itself to stop forcing HTTPS internally
  extraArgs:
    - --insecure
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  enabled: true

repoServer:
  volumes: []
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

controller:
  metrics:
    enabled: true
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  
  # Sync every 2 minutes
  extraArgs:
    - --app-resync=120

notifications:
  enabled: false

dex:
  enabled: false