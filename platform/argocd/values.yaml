# ArgoCD Helm Values for Homelab
# Chart: argo-cd v9.3.0
# App: ArgoCD v3.2.3

global:
  domain: argocd.mmrajputhomelab.org

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.mmrajputhomelab.org
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    path: /
    pathType: Prefix
    tls: true
    extraTls:
      - hosts:
          - argocd.mmrajputhomelab.org
        secretName: wildcard-homelab-tls

  extraArgs:
    - --insecure
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  enabled: true

repoServer:
  volumes: []
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

controller:
  metrics:
    enabled: true
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  
  # Sync every 2 minutes
  extraArgs:
    - --app-resync=120

notifications:
  enabled: false

dex:
  enabled: false