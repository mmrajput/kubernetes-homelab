apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: data
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # --- Helm apps ---

          # CloudNativePG: PostgreSQL operator managing keycloak-db, nextcloud-db clusters
          - name: cloudnativepg
            chart: cloudnative-pg
            helmRepoURL: https://cloudnative-pg.github.io/charts
            chartVersion: 0.27.1
            namespace: cnpg-system
            valuesFile: platform/data/cnpg/values.yaml

          # MinIO: S3-compatible object store for Velero, CNPG WAL, Loki
          - name: minio
            chart: minio
            helmRepoURL: https://charts.min.io
            chartVersion: 5.4.0
            namespace: minio
            valuesFile: platform/data/minio/values.yaml

          # Velero: cluster and PVC backup to MinIO; rclone offloads to OneDrive
          - name: velero
            chart: velero
            helmRepoURL: https://vmware-tanzu.github.io/helm-charts
            chartVersion: 12.0.0
            namespace: velero
            valuesFile: platform/data/velero/values.yaml

          # --- Git-raw apps ---

          # CNPG clusters: keycloak-db, nextcloud-db (staging), nextcloud-prod-db
          - name: cnpg-clusters
            path: platform/data/cnpg/clusters
            namespace: databases
            recurse: false

          # Rclone CronJob: syncs MinIO velero+cnpg-backups buckets → OneDrive at 04:00 UTC
          - name: rclone-onedrive-sync
            path: platform/data/rclone
            namespace: velero
            recurse: false

  # Note: longhorn is intentionally kept as a standalone Application (longhorn-app.yaml)
  # because it requires ignoreDifferences for CRD status fields and DaemonSet annotations.

  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: data
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
{{- if .chart }}
      sources:
        - repoURL: "{{ .helmRepoURL }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .chartVersion }}"
          helm:
            valueFiles:
              - "$values/{{ .valuesFile }}"
        - repoURL: https://github.com/mmrajput/kubernetes-homelab
          targetRevision: HEAD
          ref: values
{{- else }}
      source:
        repoURL: https://github.com/mmrajput/kubernetes-homelab
        targetRevision: HEAD
        path: "{{ .path }}"
        directory:
          recurse: {{ .recurse }}
{{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
