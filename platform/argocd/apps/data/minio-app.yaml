apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://charts.min.io
      chart: minio
      targetRevision: 5.4.0
      helm:
        valueFiles:
          - $values/platform/data/minio/values.yaml

    - repoURL: https://github.com/mmrajput/kubernetes-homelab
      targetRevision: 1cabf3d
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: minio

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false