apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-ops-helm
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # k8sgpt-operator: CRD + controller for AI-assisted cluster diagnostics
          # Installs the K8sGPT CRD; the K8sGPT CR is in ai-ops-git below
          - name: k8sgpt-operator
            helmRepoURL: https://charts.k8sgpt.ai/
            chart: k8sgpt-operator
            chartVersion: 0.2.27
            namespace: k8sgpt
            valuesFile: platform/ai-ops/k8sgpt/values.yaml

          # Ollama: local LLM inference server, runs qwen2.5:3b (CPU, Q4 default)
          - name: ollama
            helmRepoURL: https://cowboysysop.github.io/charts/
            chart: ollama
            chartVersion: 3.0.0
            namespace: k8sgpt
            valuesFile: platform/ai-ops/ollama/values.yaml

  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: ai-ops
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{ .helmRepoURL }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .chartVersion }}"
          helm:
            valueFiles:
              - "$values/{{ .valuesFile }}"
        - repoURL: https://github.com/mmrajput/kubernetes-homelab
          targetRevision: HEAD
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-ops-git
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # K8sGPT CR: defines analysis backend (Ollama) and scan schedule
          # Depends on k8sgpt-operator CRDs — will retry until CRDs are ready
          - name: k8sgpt-config
            path: platform/ai-ops/k8sgpt/config
            namespace: k8sgpt

  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: ai-ops
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/mmrajput/kubernetes-homelab
        targetRevision: HEAD
        path: "{{ .path }}"
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
