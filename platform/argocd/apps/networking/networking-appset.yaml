apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: networking-helm
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # cert-manager: webhook certificate management for cluster operators
          - name: cert-manager
            chart: cert-manager
            helmRepoURL: https://charts.jetstack.io
            chartVersion: v1.16.2
            namespace: cert-manager
            valuesFile: platform/networking/cert-manager/values.yaml

          # ingress-nginx: NodePort ingress for Cloudflare Tunnel
          - name: ingress-nginx
            chart: ingress-nginx
            helmRepoURL: https://kubernetes.github.io/ingress-nginx
            chartVersion: "4.11.3"
            namespace: ingress-nginx
            valuesFile: platform/networking/nginx-ingress/values.yaml

  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: networking
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{ .helmRepoURL }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .chartVersion }}"
          helm:
            valueFiles:
              - "$values/{{ .valuesFile }}"
        - repoURL: https://github.com/mmrajput/kubernetes-homelab
          targetRevision: HEAD
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: networking-git
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # NetworkPolicies: default-deny + allow rules for all platform namespaces
          - name: network-policies
            path: platform/networking/network-policies
            namespace: ingress-nginx

  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: networking
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/mmrajput/kubernetes-homelab
        targetRevision: HEAD
        path: "{{ .path }}"
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
