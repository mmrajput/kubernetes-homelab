# Keycloak - Central OIDC Identity Provider
# Chart: codecentric/keycloakx 7.1.9 (Keycloak 26.5.5)
# Image: quay.io/keycloak/keycloak (official Red Hat registry)

replicas: 1

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.5.5"
  pullPolicy: IfNotPresent

# Pod security context - required for restricted PSS
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Keycloak configuration via environment variables
extraEnv: |
  - name: KC_DB
    value: postgres
  - name: KC_DB_URL
    value: jdbc:postgresql://keycloak-db-rw.databases.svc.cluster.local:5432/keycloak
  - name: KC_DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: db-username
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: db-password
  - name: KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: admin-user
  - name: KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: admin-password
  - name: KC_HOSTNAME
    value: keycloak.mmrajputhomelab.org
  - name: KC_HOSTNAME_STRICT
    value: "false"

# Keycloak startup command
command:
  - "/opt/keycloak/bin/kc.sh"
  - "start"

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
  rules:
    - host: keycloak.mmrajputhomelab.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - keycloak.mmrajputhomelab.org
      secretName: wildcard-homelab-tls

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
