# Keycloak - Central OIDC Identity Provider
# Chart: codecentric/keycloakx 7.1.9 (Keycloak 26.5.5)
# Image: quay.io/keycloak/keycloak (official Red Hat registry)

replicas: 1

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.5.5"
  pullPolicy: IfNotPresent

# Pod security context - required for restricted PSS
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Override chart default of /auth — Keycloak 17+ serves from root
http:
  relativePath: "/"

# Disable legacy proxy mode — KC_PROXY was removed in Keycloak 26
# KC_PROXY_HEADERS is set explicitly in extraEnv instead
proxy:
  enabled: false

extraEnv: |
  - name: KC_DB
    value: postgres
  - name: KC_DB_URL
    value: jdbc:postgresql://keycloak-db-rw.databases.svc.cluster.local:5432/keycloak
  - name: KC_DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: db-username
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: db-password
  - name: KC_BOOTSTRAP_ADMIN_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: admin-user
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: admin-password
  - name: KC_PROXY_HEADERS
    value: "xforwarded"
  - name: KC_HOSTNAME
    value: "https://keycloak.mmrajputhomelab.org"
  - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
    value: "true"

command:
  - "/opt/keycloak/bin/kc.sh"
  - "start"

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
  rules:
    - host: keycloak.mmrajputhomelab.org
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi