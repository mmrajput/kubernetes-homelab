apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-default-deny
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-allow
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress-nginx to reach ArgoCD server
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080  # ArgoCD server HTTP
          protocol: TCP
    # Allow intra-namespace communication
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
    # Allow Prometheus to scrape ArgoCD metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8082  # application-controller metrics
          protocol: TCP
        - port: 8083  # applicationset-controller metrics
          protocol: TCP
        - port: 8084  # repo-server metrics
          protocol: TCP
        - port: 8085  # argocd-server metrics
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow intra-namespace communication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
    # Allow reaching Kubernetes API
    # Both ClusterIP and control plane node IP needed for Calico DNAT
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32  # kubernetes service ClusterIP
        - ipBlock:
            cidr: 192.168.178.34/32  # control plane node IP (post-DNAT)
      ports:
        - port: 443   # Kubernetes API via ClusterIP
          protocol: TCP
        - port: 6443  # Kubernetes API via node IP
          protocol: TCP
    # Allow reaching GitHub and Helm repositories
    - ports:
        - port: 443
          protocol: TCP
