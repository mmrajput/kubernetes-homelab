apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-default-deny
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress-nginx to reach all monitoring services
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow intra-namespace communication (Prometheus → Alertmanager, Grafana → Loki etc.)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53  # DNS UDP
          protocol: UDP
        - port: 53  # DNS TCP
          protocol: TCP
    # Allow intra-namespace communication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Allow scraping metrics from pod IPs across all namespaces
    - to:
        - namespaceSelector: {}
      ports:
        - port: 9100   # node-exporter (pod-IP path; hostNetwork pods need ipBlock below)
          protocol: TCP
        - port: 9153   # coredns metrics
          protocol: TCP
        - port: 9402   # cert-manager metrics
          protocol: TCP
        - port: 10254  # ingress-nginx metrics
          protocol: TCP
        - port: 3101   # promtail metrics
          protocol: TCP
    # Kubelet, node-exporter, kube-proxy — run on host network; target IP is the node IP,
    # not a pod overlay IP, so namespaceSelector cannot match them
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32  # k8s-cp-01
        - ipBlock:
            cidr: 192.168.178.35/32  # k8s-worker-01
        - ipBlock:
            cidr: 192.168.178.36/32  # k8s-worker-02
      ports:
        - port: 10250  # kubelet metrics + /metrics/cadvisor
          protocol: TCP
        - port: 9100   # node-exporter (hostNetwork)
          protocol: TCP
        - port: 10249  # kube-proxy metrics
          protocol: TCP
    # Control-plane-only host processes
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32  # k8s-cp-01
      ports:
        - port: 10257  # kube-controller-manager metrics (HTTPS)
          protocol: TCP
        - port: 10259  # kube-scheduler metrics (HTTPS)
          protocol: TCP
        - port: 2381   # kube-etcd metrics (HTTP)
          protocol: TCP
    # Allow reaching Kubernetes API for service discovery
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32  # kubernetes service ClusterIP
      ports:
        - port: 443  # Kubernetes API
          protocol: TCP
    # Allow reaching Kubernetes API server - control plane node IP
    # Required by Calico: evaluates NetworkPolicy before kube-proxy DNAT translation
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 6443
          protocol: TCP
    # Allow external notifications (Alertmanager webhooks)
    - ports:
        - port: 443  # HTTPS
          protocol: TCP
    # Allow Loki to write to MinIO S3 backend
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - port: 9000
          protocol: TCP
    # Allow access to Longhorn storage backend
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: longhorn-system
      ports:
        - port: 9500
          protocol: TCP
    # Allow Prometheus to scrape ArgoCD metrics
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - port: 8082  # argocd-application-controller metrics
          protocol: TCP
        - port: 8083  # argocd-server metrics
          protocol: TCP
        - port: 8084  # argocd-repo-server metrics
          protocol: TCP
    # Allow Prometheus to scrape CloudNativePG operator metrics
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - port: 8080  # cnpg operator metrics
          protocol: TCP
    # Allow Prometheus to scrape CNPG instance metrics in databases namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: databases
      ports:
        - port: 9187  # cnpg per-instance metrics exporter
          protocol: TCP
    # Allow Prometheus to scrape Velero metrics
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: velero
      ports:
        - port: 8085  # velero metrics
          protocol: TCP
    # Allow Prometheus to scrape falcosidekick metrics
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: falco
      ports:
        - port: 2802  # falcosidekick metrics
          protocol: TCP