apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8sgpt-default-deny
  namespace: k8sgpt
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# k8sgpt-operator controller-manager
# Label: control-plane=controller-manager (standard kubebuilder pattern)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8sgpt-operator-allow
  namespace: k8sgpt
spec:
  podSelector:
    matchLabels:
      control-plane: controller-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape operator metrics (port 8080, controller-runtime default)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API — ClusterIP (Calico evaluates before DNAT, both IPs required)
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32
      ports:
        - port: 443
          protocol: TCP
    # Kubernetes API — control plane direct
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 6443
          protocol: TCP
    # gRPC to k8sgpt runner pod (operator calls runner to trigger analysis)
    - to:
        - podSelector:
            matchLabels:
              app: k8sgpt
      ports:
        - port: 8080
          protocol: TCP
---
# k8sgpt runner pod — deployed by the K8sGPT CR (label: app=k8sgpt)
# Scans cluster resources and stores raw Result CRs; AI is disabled.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8sgpt-runner-allow
  namespace: k8sgpt
spec:
  podSelector:
    matchLabels:
      app: k8sgpt
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow operator to call runner gRPC API (triggers analysis reconciliation)
    - from:
        - podSelector:
            matchLabels:
              control-plane: controller-manager
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API — ClusterIP (Calico evaluates before DNAT, both IPs required)
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32
      ports:
        - port: 443
          protocol: TCP
    # Kubernetes API — control plane direct
    - to:
        - ipBlock:
            cidr: 192.168.178.34/32
      ports:
        - port: 6443
          protocol: TCP
