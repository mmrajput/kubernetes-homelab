apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-wildcard-cert
  namespace: cert-manager
spec:
  secretName: test-wildcard-tls
  issuerRef:
    name: letsencrypt-staging  # Use staging for initial test
    kind: ClusterIssuer
  commonName: "*.homelab.mmrajputhomelab.org"
  dnsNames:
    - "*.homelab.mmrajputhomelab.org"
    - "homelab.mmrajputhomelab.org"  # Include apex domain