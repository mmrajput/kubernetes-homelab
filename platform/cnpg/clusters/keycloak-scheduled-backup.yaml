apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: keycloak-db-backup
  namespace: databases
spec:
  # Run base backup daily at 2:00 AM
  # WAL archiving is continuous and independent of this schedule
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: keycloak-db
  target: primary
  method: barmanObjectStore