apiVersion: v1
kind: Namespace
metadata:
  name: velero
  labels:
    app.kubernetes.io/name: velero
    # node-agent DaemonSet requires host path access to read PVC data for
    # file-system backup — privileged PSS required (same pattern as Promtail)
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
