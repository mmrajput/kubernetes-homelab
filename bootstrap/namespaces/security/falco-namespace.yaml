apiVersion: v1
kind: Namespace
metadata:
  name: falco
  labels:
    kubernetes.io/metadata.name: falco
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
  annotations:
    # PSS privileged: Falco loads the modern_ebpf driver and inspects host
    # syscalls — incompatible with baseline or restricted PSS.
