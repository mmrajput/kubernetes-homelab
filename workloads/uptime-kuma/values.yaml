# Uptime Kuma Helm values
# Chart: dirsigler/uptime-kuma v4.0.0, App: 2.1.1
# https://helm.irsigler.cloud

# -- Pod-level security context
# Uptime Kuma runs as node user (uid 1000) — compatible with restricted PSS.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Uptime Kuma writes SQLite DB to /app/data at runtime
  capabilities:
    drop:
      - ALL

# -- Persistence (v4 schema: 'volume', not 'persistence')
volume:
  enabled: true
  storageClassName: longhorn
  accessMode: ReadWriteOnce
  size: 2Gi

# -- Ingress
# Chart v4 default annotations already include proxy-read/send-timeout and
# WebSocket proxy headers (server-snippets) — only add cert-manager annotation.
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: status.mmrajputhomelab.org
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: uptime-kuma-tls
      hosts:
        - status.mmrajputhomelab.org

# -- Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  interval: 60s
  scrapeTimeout: 10s

# -- Disable built-in NetworkPolicy — managed externally via uptime-kuma-netpol.yaml
networkPolicy:
  enabled: false

# -- Resource limits
resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m
